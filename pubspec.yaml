name: smartquiz_pro
description: SmartQuiz Pro - AI Powered Learning & Assessment App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (Updated to latest compatible versions)
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2

  # Google Sign In
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.1

  # UI & Animations
  lottie: ^3.1.0
  animate_do: ^3.3.4
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Utilities
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  permission_handler: ^11.2.0
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
